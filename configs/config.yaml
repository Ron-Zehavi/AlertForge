# AlertForge configuration

api:
  host: "0.0.0.0"
  port: 8000

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  models_dir: "data/models"

brokers:
  fink:
    base_url: "https://fink-portal.org"
    rate_limit_rps: 5.0
    timeout_s: 30.0
  alerce:
    base_url: "https://api.alerce.online"
    rate_limit_rps: 10.0
    timeout_s: 30.0
  tns:
    base_url: "https://www.wis-tns.org/api"
    rate_limit_rps: 0.5
    timeout_s: 60.0
  irsa:
    base_url: "https://irsa.ipac.caltech.edu"
    rate_limit_rps: 5.0
    timeout_s: 30.0

cache:
  enabled: true
  ttl_days: 30
